@if (networkConnected$ | ngrxPush) { @if (avatar$ | ngrxPush; as avatar) {
<ion-img [src]="avatar" (click)="selectAvatar()"></ion-img>
} @else { @if (editable) {
<mat-icon (click)="selectAvatar()"> add_a_photo </mat-icon>
} @if (!editable) {
<mat-icon class="view-only"> account_circle </mat-icon>
} }
<input #input (change)="uploadAvatar($event)" type="file" accept="image/jpeg" />
} @else {
<mat-icon>cloud_off</mat-icon>
}
