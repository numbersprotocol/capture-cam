<ion-button (click)="dismiss()" color="light" fill="clear" class="dismiss">
  <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
</ion-button>

@if (isImage$ | ngrxPush) {
<pinch-zoom *ngrxLet="src$ as src">
  <img decoding="async" loading="lazy" [src]="src" />
</pinch-zoom>
} @if (isVideo$ | ngrxPush) {
<video [attr.src]="src$ | ngrxPush" controls autoplay></video>
}
