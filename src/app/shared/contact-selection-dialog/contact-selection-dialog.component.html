<h1 *transloco="let t" mat-dialog-title>{{ t('selectContact') }}</h1>

<div *transloco="let t" mat-dialog-content>
  @if ((contacts$ | ngrxPush)?.length === 0 && (isFetching$ | ngrxPush)) {
  <mat-spinner diameter="24"></mat-spinner>
  }
  <mat-action-list>
    @for (contact of contacts$ | ngrxPush; track contact) {
    <mat-list-item
      class="contact-list-item"
      [mat-dialog-close]="contact.contact_email"
    >
      <img
        decoding="async"
        loading="lazy"
        matListItemAvatar
        [attr.src]="
          contact.contact_profile_picture_thumbnail ||
          '/assets/images/avatar-placeholder.png'
        "
      />
      <div matListItemLine>
        {{
          contact.contact_profile_display_name ||
            contact.contact_name ||
            contact.contact_email
        }}
      </div>
    </mat-list-item>
    }
    <mat-list-item
      class="contact-list-item"
      (click)="openFriendInvitationDialog()"
    >
      <mat-icon matListItemIcon>share</mat-icon>
      <div matListItemLine>{{ t('inviteFriend') }}</div>
    </mat-list-item>
  </mat-action-list>
</div>

<div *transloco="let t" mat-dialog-actions>
  <button (click)="onCancelClicked()" mat-button>{{ t('cancel') }}</button>
</div>
