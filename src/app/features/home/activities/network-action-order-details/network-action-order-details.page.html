@if (isOffline$ | ngrxPush) {
<mat-toolbar *transloco="let t">
  <app-capture-back-button></app-capture-back-button>
  <span>{{ t('networkActionOrderDetails') }}</span>
</mat-toolbar>
} @else { @if (iframeUrl$ | ngrxPush; as iframeUrl) {
<iframe [src]="iframeUrl | safeResourceUrl" allow="accelerometer; gyroscope">

} @if ((iframeLoaded$ | async) !== true) {
<ion-spinner name="lines-sharp"></ion-spinner>
} }
