@if ((networkConnected$ | ngrxPush) === false) {
<div class="no-network-text">
  {{ 'message.networkNotConnected' | transloco }}
</div>
} @else { @if ( bubbleIframeUrlWithCachedJWTToke$ | ngrxPush; as
bubbleIframeUrlWithCachedJWTToken ) {
<div>
  <iframe
    #collectionIframe
    [src]="bubbleIframeUrlWithCachedJWTToken"
    class="bubble-iframe"
    allow="accelerometer; gyroscope"
  ></iframe>
</div>
} }
