@if ((networkConnected$ | async) === false) {
<mat-toolbar>
  <app-capture-back-button></app-capture-back-button>
  <span>{{ 'dataPolicy' | transloco }}</span>
</mat-toolbar>
<div class="no-network-text">
  {{ 'message.networkNotConnected' | transloco }}
</div>
} @else {
<iframe
  [src]="dataPolicyUrl | safeResourceUrl"
  class="bubble-iframe"
  allow="accelerometer; gyroscope"
></iframe>
@if ((iframeLoaded$ | async) !== true) {
<ion-spinner name="lines-sharp"></ion-spinner>
} }
