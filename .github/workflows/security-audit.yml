name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # Fails only on critical vulnerabilities. High-severity advisories are
      # still reported in the log but do not break the build — currently the
      # only outstanding "high" findings are @angular/* XSS advisories that
      # require an Angular 18 → 21 major upgrade (tracked separately).
      # Revisit this threshold after the Angular upgrade lands.
      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev

      - name: Report high-severity advisories (informational)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev || true
